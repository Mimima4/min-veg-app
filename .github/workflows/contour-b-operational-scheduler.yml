# P06-CLOSURE Block B — scheduled Contour B operational ingest (not on route load).
name: Contour B operational scheduler

on:
  schedule:
    # Weekly Monday 04:00 UTC — adjust in P06-CLOSURE if cadence changes.
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pass --dry-run to ingest (no PSA writes)"
        type: boolean
        default: false
      profession:
        description: "Optional filter (e.g. electrician)"
        type: string
        required: false
      county:
        description: "Optional filter (e.g. 56)"
        type: string
        required: false

jobs:
  contour-b-operational:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run Contour B scheduler
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTOUR_B_SCHEDULER_MAX_CONSECUTIVE_FAILURES: "5"
        run: |
          ARGS=()
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          if [[ -n "${{ inputs.profession }}" ]]; then
            ARGS+=(--profession "${{ inputs.profession }}")
          fi
          if [[ -n "${{ inputs.county }}" ]]; then
            ARGS+=(--county "${{ inputs.county }}")
          fi
          node scripts/run-contour-b-operational-scheduler.mjs "${ARGS[@]}"
